name: "[101] Setup Local Dev Environment"
description: Get a LinkedTrust project running locally
title: "[DEV-101] Setup Local Dev Environment"
labels: ["onboarding", "developer"]
body:
  - type: markdown
    attributes:
      value: |
        ## Goal
        Clone a LinkedTrust repo, get it running locally, verify it works.
        
        ## Clues
        
        **Beginner-Friendly Repos to Try:**
        - [site-linkedtrust-us](https://github.com/Cooperation-org/site-linkedtrust-us) - LinkedTrust website
        - [claim-lexicon](https://github.com/Cooperation-org/claim-lexicon) - Claims processing
        - Check pinned messages in #dev or #engineering for more options
        
        **Basic Command Line Help:**
        - Windows: Use `dir` to list files, `cd foldername` to navigate
        - Mac/Linux: Use `ls` to list files, `cd foldername` to navigate
        - After cloning: `cd repository-name` to enter the folder
        
        **Setup Steps:**
        - Every repo should have a README with setup instructions
        - If README is missing steps, that's your breadcrumb opportunity - document what you learned!
        - Common issues: node version, env vars, database setup
        
  - type: input
    id: repo
    attributes:
      label: Repository
      description: Which repo did you set up?
    validations:
      required: true
  - type: textarea
    id: proof
    attributes:
      label: Evidence
      description: Screenshot of it running or link to localhost
    validations:
      required: true
  - type: textarea
    id: issues-found
    attributes:
      label: Issues Found
      description: What wasn't in the README? Did you fix it?
    validations:
      required: false
```

---

## What We Improved:

✅ **Added specific repo examples** (claim-lexicon, site-linkedtrust-us)
✅ **Added command line help** (dir/ls commands for Windows/Mac)
✅ **Clearer structure** with sections
✅ **Kept the "hunt, don't wait" philosophy**
✅ **More beginner-friendly**

